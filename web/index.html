<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Traeclaw Lite</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div style="display: flex; align-items: center; gap: 12px;">
        <button id="sidebarToggleBtn" class="icon-button" title="收起/展开侧栏" type="button">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
            <line x1="9" y1="3" x2="9" y2="21"></line>
          </svg>
        </button>
        <div>
          <h1>Traeclaw Lite</h1>
          <p id="subtitle">本地任务、结果和通知配置</p>
        </div>
      </div>
      <div class="topbar-actions">
        <button id="refreshBtn" class="button">刷新</button>
        <a class="button primary" href="/settings">设置</a>
      </div>
    </header>

    <main class="layout">
      <section class="panel agents-panel">
        <div class="section-head">
          <div style="display: flex; align-items: center; gap: 8px;">
            <h2>任务</h2>
            <span id="agentCount" class="muted"></span>
          </div>
          <button class="icon-button" id="searchToggleBtn" title="搜索" type="button">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"></circle>
              <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
          </button>
        </div>
        <div class="search-bar-wrap" id="searchBarWrap">
          <input type="text" id="searchInput" placeholder="搜索任务..." autocomplete="off" />
        </div>
        <div id="agentsList" class="agents-list">
          <div class="empty">加载中...</div>
        </div>
      </section>

      <section class="panel detail-panel">
        <div id="agentDetail" class="agent-detail">
          <div class="empty">选择一个任务</div>
        </div>
      </section>
    </main>

    <!-- 计划设置编辑模态弹窗 -->
    <div id="scheduleModal" class="modal-overlay">
      <div class="modal-content" style="width: 66.6vw; max-width: 1000px; min-width: 450px;">
        <div class="modal-header">
          <div style="display: flex; align-items: center; gap: 8px;">
            <h2 id="scheduleModalTitle">计划设置</h2>
          </div>
          <button id="closeScheduleModalBtn" class="modal-close-btn" type="button">&times;</button>
        </div>
        <div class="modal-body form" id="scheduleModalBody">
          <!-- 计划编辑表单将动态生成于此 -->
        </div>
      </div>
    </div>

    <!-- 运行一次确认模态弹窗 -->
    <div id="runConfirmModal" class="modal-overlay">
      <div class="modal-content" style="max-width: 400px;">
        <div class="modal-header">
          <div style="display: flex; align-items: center; gap: 8px;">
            <h2 id="runConfirmModalTitle">确认运行</h2>
          </div>
          <button id="closeRunConfirmModalBtn" class="modal-close-btn" type="button">&times;</button>
        </div>
        <div class="modal-body form" style="display: flex; flex-direction: column; gap: 12px; padding-top: 8px;">
          <p id="runConfirmMessage" style="margin: 0; font-size: 14px; color: var(--text);">是否确认运行该任务？</p>
          <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; user-select: none; font-size: 14px; margin-top: 8px;">
            <input type="checkbox" id="runSendToTelegram" checked style="margin: 0;" />
            <span>发送通知到 Telegram</span>
          </label>
          <div style="display: flex; justify-content: flex-end; gap: 8px; margin-top: 12px; border-top: 1px solid var(--line); padding-top: 12px;">
            <button id="cancelRunBtn" class="button secondary" type="button" style="background-color: var(--line); color: var(--text);">取消</button>
            <button id="confirmRunBtn" class="button" type="button">运行</button>
          </div>
        </div>
      </div>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
