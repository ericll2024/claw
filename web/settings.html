<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>设置 - claw</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>设置</h1>
        <p id="subtitle">通知、AI 和 mFood 技能配置</p>
      </div>
      <div class="topbar-actions">
        <a class="button" href="/">返回看板</a>
        <button id="logoutBtn" class="button secondary">退出登录</button>
      </div>
    </header>

    <main class="settings-scroll-container">
      <div class="settings-layout">
      <section class="panel settings-wide">
        <div class="section-head">
          <h2>Telegram</h2>
          <span id="telegramState" class="badge">未配置</span>
        </div>
        <form id="telegramForm" class="form compact-form">
          <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; margin-top: 4px;">
            <input id="telegramEnabled" type="checkbox" style="margin: 0;" />
            <span>启用通知</span>
          </label>
          <label>
            <span>Bot Token</span>
            <input id="telegramToken" type="password" autocomplete="off" placeholder="留空则保留现有 token" />
          </label>
          <label>
            <span>主 Chat ID</span>
            <input id="telegramChat" type="text" autocomplete="off" placeholder="-100..." />
          </label>
          <div class="form-actions" style="gap: 8px;">
            <button class="button primary" type="submit">保存 Telegram 配置</button>
            <button id="openListenerBtn" class="button" type="button">消息监听</button>
          </div>
        </form>
      </section>

      <section class="panel settings-wide">
        <div class="section-head">
          <h2>AI</h2>
          <span id="aiState" class="badge">未配置</span>
        </div>
        <form id="aiForm" class="form compact-form">
          <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; margin-top: 4px;">
            <input id="aiEnabled" type="checkbox" style="margin: 0;" />
            <span>启用 Telegram AI 改代码</span>
          </label>
          <label>
            <span>默认 Provider</span>
            <select id="aiDefaultProvider">
              <option value="deepseek">DeepSeek</option>
              <option value="gemini">Gemini CLI</option>
            </select>
          </label>
          <label>
            <span>DeepSeek API Base</span>
            <input id="aiDeepseekApiBase" type="text" autocomplete="off" placeholder="https://api.deepseek.com" />
          </label>
          <label>
            <span>DeepSeek API Key</span>
            <input id="aiDeepseekApiKey" type="password" autocomplete="off" placeholder="留空则保留现有值" />
          </label>
          <label>
            <span>DeepSeek Model</span>
            <input id="aiDeepseekModel" type="text" autocomplete="off" placeholder="deepseek-chat" />
          </label>
          <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; margin-top: 4px;">
            <input id="aiGeminiCliEnabled" type="checkbox" style="margin: 0;" />
            <span>允许 Gemini CLI</span>
          </label>
          <label>
            <span>Gemini CLI Command</span>
            <input id="aiGeminiCliCommand" type="text" autocomplete="off" placeholder="gemini" />
          </label>
          <div class="form-actions" style="display: flex; gap: 8px;">
            <button class="button primary" type="submit">保存 AI 配置</button>
            <button id="testDeepseekBtn" class="button" type="button">测试 DeepSeek</button>
          </div>
        </form>
      </section>

      <section class="panel settings-wide">
        <div class="section-head">
          <h2>mFood</h2>
          <span id="mfoodState" class="badge">未配置</span>
        </div>
        <form id="mfoodLoginForm" class="form compact-form">
          <div class="form-group" style="border-bottom: 0; padding-bottom: 0;">
            <strong>mFood信息</strong>
            <label>
              <span>Account</span>
              <input id="mfoodLoginAccount" type="text" autocomplete="off" placeholder="mFood 账号" />
            </label>
            <label>
              <span>Password MD5</span>
              <input id="mfoodLoginPasswordMd5" type="password" autocomplete="off" placeholder="留空则保留现有值" />
            </label>
            <div class="mfood-token-status" style="margin-top: 12px; font-size: 13px; display: flex; flex-direction: column; gap: 6px;">
              <div>
                <span>登录状态：</span>
                <span id="mfoodLoginStatusBadge" class="badge">未登录</span>
                <span style="margin-left: 12px;">Token状态：</span>
                <span id="mfoodTokenStatusBadge" class="badge">未检测</span>
              </div>
              <div id="mfoodTokenInfo" style="color: var(--muted); font-size: 12px; display: none;">
                当前 Token: <code id="mfoodCurrentToken" style="background: var(--bg); padding: 2px 6px; border-radius: 4px; font-family: monospace;"></code>
              </div>
              <div style="color: var(--muted); font-size: 12px;">
                上次检查时间：<span id="mfoodLastCheckTime">无</span>
              </div>
            </div>
          </div>
          <div class="form-actions" style="display: flex; gap: 8px;">
            <button class="button primary" type="submit">保存登录配置</button>
            <button id="checkMFoodTokenBtn" class="button" type="button">检查 Token</button>
            <button id="loginMFoodBtn" class="button" type="button">手动登录</button>
          </div>
        </form>

        <hr style="border: 0; border-top: 1px solid var(--line); margin: 0;" />

        <form id="mfoodShenceForm" class="form compact-form">
          <div class="form-group" style="border-bottom: 0; padding-bottom: 0;">
            <strong>神策</strong>
            <label>
              <span>API URL</span>
              <input id="mfoodShenceApiUrl" type="text" autocomplete="off" />
            </label>
            <label>
              <span>Sensors API Key</span>
              <input id="mfoodShenceApiKey" type="password" autocomplete="off" placeholder="留空则保留现有值" />
            </label>
            <label>
              <span>Sensors Project</span>
              <input id="mfoodShenceProject" type="text" autocomplete="off" placeholder="production" />
            </label>
          </div>
          <div class="form-actions">
            <button class="button primary" type="submit">保存神策配置</button>
          </div>
        </form>

      </section>

      <section class="panel settings-wide">
        <div class="section-head">
          <h2>Facebook</h2>
          <span id="facebookState" class="badge">未配置</span>
        </div>
        <form id="facebookForm" class="form compact-form">
          <div class="form-group" style="border-bottom: 0; padding-bottom: 0;">
            <strong>监控群组链接</strong>
            <div id="facebookGroupsContainer" style="display: flex; flex-direction: column; gap: 8px; margin-top: 8px; margin-bottom: 12px;">
              <!-- 动态渲染群组列表 -->
            </div>
            <div style="display: flex; gap: 8px; align-items: center;">
              <input id="newFacebookGroupUrl" type="text" autocomplete="off" placeholder="输入新的 Facebook 群组链接 (https://www.facebook.com/groups/...)" style="flex: 1;" />
              <button id="addFacebookGroupBtn" class="button" type="button">添加</button>
            </div>
          </div>
          <div class="form-actions">
            <button class="button primary" type="submit">保存 Facebook 配置</button>
          </div>
        </form>
      </section>
    </div>

  </main>

    <!-- Telegram 消息監聽模態彈窗 -->
    <div id="listenerModal" class="modal-overlay">
      <div class="modal-content">
        <div class="modal-header">
          <div style="display: flex; align-items: center; gap: 8px;">
            <h2>Telegram 消息监听</h2>
            <span id="listenerBadge" class="badge">未运行</span>
          </div>
          <button id="closeModalBtn" class="modal-close-btn" type="button">&times;</button>
        </div>
        <div class="modal-body form">
          <div class="listener-controls" style="display: flex; gap: 8px; margin-bottom: 12px;">
            <button id="toggleListenerBtn" class="button primary" type="button">开启监听</button>
            <button id="pollOnceBtn" class="button" type="button">手动拉取</button>
          </div>
          <div class="listener-info" style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 12px; color: var(--muted); border-bottom: 1px solid var(--line); padding-bottom: 10px; margin-bottom: 10px;">
            <div>Bot 用户名: <span id="listenerBotUser" style="font-weight: 600; color: var(--text);">-</span></div>
            <div>最后轮询时间: <span id="listenerLastPoll" style="font-weight: 600; color: var(--text);">-</span></div>
            <div id="listenerErrorContainer" style="display: none; color: var(--red); grid-column: 1 / -1; margin-top: 4px;">错误: <span id="listenerErrorText"></span></div>
          </div>
          <div style="font-weight: 650; font-size: 13px; margin-bottom: 8px;">接收到的消息：</div>
          <div id="updatesList" class="updates-list" style="max-height: 500px; overflow-y: auto; display: grid; gap: 8px; padding-right: 4px;">
            <div class="empty">暂无消息</div>
          </div>
          <div style="font-weight: 650; font-size: 13px; margin: 16px 0 8px;">AI 作业：</div>
          <div id="aiJobsList" class="updates-list" style="max-height: 320px; overflow-y: auto; display: grid; gap: 8px; padding-right: 4px;">
            <div class="empty">暂无 AI 作业</div>
          </div>
        </div>
      </div>
    </div>

    <script src="/settings.js"></script>
  </body>
</html>
